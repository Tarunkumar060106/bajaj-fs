services:
  - type: web
    name: bajaj-fs-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: USER_ID
        sync: false
      - key: EMAIL_ID
        sync: false
      - key: COLLEGE_ROLL_NUMBER
        sync: false
